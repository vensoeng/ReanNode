    <script>
    // 1. Configuration
    const DEFAULT_LANG = 'kh';
    const SUPPORTED_LANGS = ['en', 'kh', 'zh'];
    const DATA_URL = "/service/";
    let GET_CURRENT_LANG = 'en';
    async function initLanguage() {
        // Check storage
        let savedLang = localStorage.getItem('user_language');
        const isFirstTime = !localStorage.getItem('language_set');
        // If first time or invalid, default to English
        if (!savedLang || !SUPPORTED_LANGS.includes(savedLang)) {
            savedLang = DEFAULT_LANG;
        }
        GET_CURRENT_LANG = savedLang;
        // Load the JSON file
        try {
            const response = await fetch(`${DATA_URL}/locales/${savedLang}.json`);
            const translations = await response.json();
            // Apply translations to the UI
            applyTranslations(translations);
            // Show the popup ONLY if it's the first time
            if (isFirstTime) {
                document.getElementById('lang-overlay').classList.remove('hidden');
            }
        } catch (error) {
            console.error("Failed to load language file", error);
        }
    }
    // 3. Helper to find elements with data-i18n attribute
    function applyTranslations(data) {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (data[key]) {
                el.innerText = data[key];
            }
        });
    }
    // Run immediately
    initLanguage();
    </script>
